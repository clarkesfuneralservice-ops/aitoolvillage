*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {

body { font-family: 'Outfit', sans-serif; background: var(--mist); color: var(--soil); min-height: 100vh; }

header {

  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
.logo span { color: var(--wheat); }
.header-sub { font-size: 0.78rem; color: rgba(255,255,255,0.5); }

.container { max-width: 1100px; margin: 0 auto; padding: 40px; }

/* BATCH SELECTOR */
.batch-selector {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px; margin-bottom: 36px;
}
.batch-btn {
  padding: 14px 16px; border-radius: 10px;
  background: white; border: 1.5px solid var(--border);
  cursor: pointer; text-align: left; transition: all 0.2s;
  font-family: 'Outfit', sans-serif;
}
.batch-btn:hover { border-color: var(--moss); }
.batch-btn.active { background: var(--soil); border-color: var(--soil); color: white; }
.batch-btn .be { font-size: 1.2rem; display: block; margin-bottom: 4px; }
.batch-btn .bt { font-size: 0.82rem; font-weight: 600; }
.batch-btn .bc { font-size: 0.7rem; opacity: 0.6; }
.batch-btn.active .bc { opacity: 0.5; }

/* CONTROLS */
.controls {
  background: white; border: 1.5px solid var(--border);
  border-radius: 12px; padding: 24px; margin-bottom: 28px;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.control-label { font-size: 0.78rem; font-weight: 600; color: var(--stone); text-transform: uppercase; letter-spacing: 0.07em; }

.btn-generate {
  background: var(--moss); color: white; border: none;
  padding: 12px 28px; border-radius: 8px;
  font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: background 0.2s;
  display: flex; align-items: center; gap: 8px;
}
.btn-generate:hover { background: var(--leaf); }
.btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-download {
  background: var(--soil); color: white; border: none;
  padding: 12px 28px; border-radius: 8px;
  font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: opacity 0.2s;
  display: none; align-items: center; gap: 8px;
}
.btn-download:hover { opacity: 0.8; }
.btn-download.visible { display: flex; }

.progress-wrap { flex: 1; min-width: 200px; }
.progress-bar-bg { background: var(--parchment); border-radius: 20px; height: 8px; overflow: hidden; }
.progress-bar { background: var(--moss); height: 100%; width: 0; border-radius: 20px; transition: width 0.4s ease; }
.progress-text { font-size: 0.75rem; color: var(--stone); margin-top: 5px; }

/* TOOL CARDS GRID */
.tools-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}

.tool-card {
  background: white; border: 1.5px solid var(--border);
  border-radius: 12px; padding: 0; overflow: hidden;
  transition: border-color 0.2s;
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.3s ease, transform 0.3s ease, border-color 0.2s;
}
.tool-card.visible { opacity: 1; transform: translateY(0); }
.tool-card:hover { border-color: var(--moss); }
.tool-card.generating { border-color: var(--wheat); animation: pulse 1.5s infinite; }

@keyframes pulse {
  0%, 100% { border-color: var(--border); }
  50% { border-color: var(--wheat); }
}

.card-header { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.card-icon { width: 40px; height: 40px; border-radius: 9px; background: var(--parchment); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
.card-name { font-weight: 600; font-size: 0.92rem; color: var(--soil); }
.card-cat { font-size: 0.7rem; color: var(--stone); margin-top: 1px; }
.card-status { margin-left: auto; font-size: 0.65rem; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
.status-pending { background: var(--parchment); color: var(--stone); }
.status-generating { background: #fff3cd; color: #856404; }
.status-done { background: #d1edda; color: #155724; }
.status-error { background: #f8d7da; color: #721c24; }

.card-body { padding: 14px 18px; }
.card-desc { font-size: 0.78rem; color: #555; line-height: 1.65; margin-bottom: 10px; min-height: 60px; }
.card-desc.skeleton { background: var(--parchment); border-radius: 4px; color: transparent; user-select: none; animation: shimmer 1.5s infinite; }

@keyframes shimmer {
  0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; }

.card-meta-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }

.price-paid { color: var(--stone); }
.card-tag { font-size: 0.65rem; background: var(--parchment); border: 1px solid var(--border); color: var(--stone); padding: 2px 7px; border-radius: 4px; }

.card-cta {

.card-cta:hover { background: var(--moss); }

.stat { background: white; border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 20px; flex: 1; min-width: 120px; }
.stat-num { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--soil); letter-spacing: -0.03em; }
.stat-label { font-size: 0.72rem; color: var(--stone); font-weight: 500; margin-top: 2px; }

/* LOG */

.log-line.info { color: var(--wheat); }
.log-line.error { color: #ef9a9a; }

let currentBatch = 0;
let generatedPages = {};
let totalGenerated = 0;
let totalDone = 0;

function selectBatch(btn, idx) {
  document.querySelectorAll('.batch-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentBatch = idx;
  document.getElementById('batchLabel').textContent = BATCHES[idx].label;
  renderToolCards(idx);
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('progressText').textContent = 'Ready to generate';
  document.getElementById('downloadBtn').classList.remove('visible');
  document.getElementById('generateBtn').disabled = false;
}

function renderToolCards(batchIdx) {
  const batch = BATCHES[batchIdx];
  const grid = document.getElementById('toolsGrid');
  grid.innerHTML = '';

  batch.tools.forEach((tool, i) => {
    const key = `${batchIdx}-${i}`;
    const existing = generatedPages[key];
    const card = document.createElement('div');
    card.className = 'tool-card';
    card.id = `card-${batchIdx}-${i}`;

    card.innerHTML = `
      <div class="card-header">
        <div class="card-icon">${tool.emoji}</div>
        <div>
          <div class="card-name">${tool.name}</div>
          <div class="card-cat">${tool.cat}</div>
        </div>
        <span class="card-status ${existing ? 'status-done' : 'status-pending'}">${existing ? '✓ Done' : 'Pending'}</span>
      </div>
      <div class="card-body">
        <div class="card-desc ${existing ? '' : 'skeleton'}">${existing ? existing.desc : 'Generating description...'}</div>
        <div class="card-meta-row">
          <div class="card-tag">${tool.cat}</div>
          <span class="card-price ${tool.free ? 'price-free' : 'price-paid'}">${tool.price}</span>
        </div>
        <a href="#" class="card-cta">${tool.cta} →</a>
      </div>
    `;

    setTimeout(() => card.classList.add('visible'), i * 30);
    grid.appendChild(card);
  });

  updateStats();
}

async function startGeneration() {
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> Generating...';

  const batch = BATCHES[currentBatch];
  const logBox = document.getElementById('logBox');
  logBox.classList.add('visible');

  addLog(`Starting ${batch.label}...`, 'info');
  addLog(`${batch.tools.length} tool pages to generate`, 'info');

  for (let i = 0; i < batch.tools.length; i++) {
    const tool = batch.tools[i];
    const key = `${currentBatch}-${i}`;

    if (generatedPages[key]) {
      addLog(`⏭ Skipping ${tool.name} (already generated)`, 'info');
      continue;
    }

    const card = document.getElementById(`card-${currentBatch}-${i}`);
    card.classList.add('generating');
    card.querySelector('.card-status').className = 'card-status status-generating';
    card.querySelector('.card-status').textContent = '⚡ Generating';

    addLog(`Generating: ${tool.name}...`);

    const progress = Math.round(((i + 1) / batch.tools.length) * 100);
    document.getElementById('progressBar').style.width = `${progress}%`;
    document.getElementById('progressText').textContent = `${i + 1} of ${batch.tools.length} — ${tool.name}`;

    try {
      const desc = await generateToolDescription(tool, batch.category);
      generatedPages[key] = { ...tool, desc, batchCategory: batch.category };

      card.classList.remove('generating');
      card.classList.add('visible');
      card.querySelector('.card-status').className = 'card-status status-done';
      card.querySelector('.card-status').textContent = '✓ Done';
      const descEl = card.querySelector('.card-desc');
      descEl.classList.remove('skeleton');
      descEl.textContent = desc;

      totalGenerated++;
      totalDone++;
      updateStats();
      addLog(`✓ ${tool.name} — done`, 'success');

    } catch (err) {
      card.classList.remove('generating');
      card.querySelector('.card-status').className = 'card-status status-error';
      card.querySelector('.card-status').textContent = '✗ Error';
      addLog(`✗ ${tool.name} failed: ${err.message}`, 'error');
    }

    await delay(400);
  }

  btn.innerHTML = '<span>✓</span> Batch Complete';
  addLog(`\n✅ ${batch.label} complete! ${batch.tools.length} pages generated.`, 'success');
  document.getElementById('downloadBtn').classList.add('visible');
  updateStats();
}

async function generateToolDescription(tool, category) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: `You are writing SEO-optimised tool descriptions for AIToolVillage.com — a directory of AI tools for marketers, accountants and professionals. 
      
Write in a direct, helpful, honest tone. No hype. No filler.

Respond ONLY with a valid JSON object in this exact format, no markdown, no explanation:
{
  "tagline": "one line, under 12 words",
  "description": "2-3 sentences, 60-90 words, SEO-friendly, mentions the tool name naturally",
  "pros": ["pro 1", "pro 2", "pro 3"],
  "cons": ["con 1", "con 2"],
  "best_for": "who benefits most from this tool in 8 words or less",
  "seo_title": "SEO page title under 60 chars",
  "meta_desc": "Meta description 140-155 chars"
}`,
      messages: [{
        role: 'user',
        content: `Generate content for this AI tool:
Name: ${tool.name}
Category: ${tool.cat} (part of ${category})
Pricing: ${tool.price}
Has free tier: ${tool.free}`
      }]
    })
  });

  const data = await response.json();
  const raw = data.content[0].text;
  const clean = raw.replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(clean);
  return parsed.description;
}

function downloadPages() {
  const batch = BATCHES[currentBatch];
  let filesGenerated = 0;

  batch.tools.forEach((tool, i) => {
    const key = `${currentBatch}-${i}`;
    const pageData = generatedPages[key];
    if (!pageData) return;

    const slug = tool.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');

    // Parse full data from stored desc — reconstruct for HTML
    const mockData = {
      description: pageData.desc,
      tagline: tool.cat,
      pros: ['AI-powered features', 'Easy to integrate', 'Saves significant time'],
      cons: ['Premium features require paid plan', 'Learning curve for beginners'],
      best_for: 'Marketers and professionals',
      seo_title: `${tool.name} Review (2026) — ${tool.cat}`,
      meta_desc: `${tool.name} review and pricing. Is ${tool.name} worth it? See pros, cons and alternatives. ${tool.price}.`
    };

    const html = generateHTML(tool, mockData, batch.category);
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${slug}.html`;

    setTimeout(() => {
      a.click();
      URL.revokeObjectURL(url);
    }, filesGenerated * 200);

    filesGenerated++;
  });

  addLog(`📦 Downloading ${filesGenerated} HTML files...`, 'success');
}

function updateStats() {
  const total = Object.keys(generatedPages).length;
  const pending = BATCHES[currentBatch].tools.length - Object.keys(generatedPages).filter(k => k.startsWith(`${currentBatch}-`)).length;
  const done = Object.keys(generatedPages).filter(k => k.startsWith(`${currentBatch}-`)).length;
  const affiliates = Object.values(generatedPages).filter(p => !p.free).length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statPending').textContent = Math.max(0, pending);
  document.getElementById('statAffiliate').textContent = affiliates;
}

function addLog(msg, type = '') {
  const log = document.getElementById('logBox');
  const line = document.createElement('div');
  line.className = `log-line ${type}`;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
