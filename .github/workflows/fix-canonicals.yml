name: Fix Missing .html in Canonical Tags

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-canonicals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Setup git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Run canonical fix script
        run: |
          python3 << 'EOF'
          import os, re

          tools_dir = 'tools'
          fixed = 0
          skipped = 0

          for fname in sorted(os.listdir(tools_dir)):
              if not fname.endswith('.html'):
                  continue
              fpath = os.path.join(tools_dir, fname)
              with open(fpath, 'r', encoding='utf-8') as f:
                  content = f.read()
              original = content

              def fix_link(m):
                  prefix, slug, quote = m.group(1), m.group(2), m.group(3)
                  return f'{prefix}{slug}.html{quote}' if not slug.endswith('.html') else m.group(0)

              content = re.sub(
                  r'(<link[^>]*rel=["\']canonical["\'][^>]*href=["\']https://aitoolvillage\.com/tools/)([\w\-]+)(["\'])',
                  fix_link, content)
              content = re.sub(
                  r'(<link[^>]*href=["\']https://aitoolvillage\.com/tools/)([\w\-]+)(["\'][^>]*rel=["\']canonical["\'])',
                  fix_link, content)

              def fix_yaml(m):
                  prefix, slug = m.group(1), m.group(2)
                  return f'{prefix}{slug}.html' if not slug.endswith('.html') else m.group(0)

              content = re.sub(
                  r'(canonical:\s*https://aitoolvillage\.com/tools/)([\w\-]+)(?![\w\-\.])',
                  fix_yaml, content)

              if content != original:
                  with open(fpath, 'w', encoding='utf-8') as f:
                      f.write(content)
                  print(f'FIXED: {fname}')
                  fixed += 1
              else:
                  skipped += 1

          print(f'Done: {fixed} fixed, {skipped} unchanged')
          EOF

      - name: Fix index.html canonical
        run: |
          python3 << 'EOF'
          import os, re
          if os.path.exists('index.html'):
              with open('index.html', 'r') as f:
                  content = f.read()
              original = content
              content = re.sub(
                  r'(<link[^>]*rel=["\']canonical["\'][^>]*href=["\'])https://aitoolvillage\.com/index\.html(["\'])',
                  r'\1https://aitoolvillage.com/\2', content)
              content = re.sub(
                  r'canonical:\s*https://aitoolvillage\.com/index\.html',
                  'canonical: https://aitoolvillage.com/', content)
              if content != original:
                  with open('index.html', 'w') as f:
                      f.write(content)
                  print('FIXED: index.html')
              else:
                  print('No change: index.html')
          EOF

      - name: Commit and push
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit — canonicals already fixed"
          else
            git commit -m "fix: canonical tags .html on tool pages"
            git push --force-with-lease origin main
            echo "Pushed successfully"
          fi

