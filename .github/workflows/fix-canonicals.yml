name: Fix Missing .html in Canonical Tags

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-canonicals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run canonical fix script
        run: |
          python3 << 'EOF'
          import os, re

          tools_dir = 'tools'
          fixed = 0
          skipped = 0

          for fname in sorted(os.listdir(tools_dir)):
              if not fname.endswith('.html'):
                  continue

              fpath = os.path.join(tools_dir, fname)
              with open(fpath, 'r', encoding='utf-8') as f:
                  content = f.read()

              original = content

              # Fix <link rel="canonical" href="...SLUG"> missing .html
              def fix_link(m):
                  prefix = m.group(1)
                  slug = m.group(2)
                  quote = m.group(3)
                  if not slug.endswith('.html'):
                      return f'{prefix}{slug}.html{quote}'
                  return m.group(0)

              content = re.sub(
                  r'(<link[^>]*rel=["\']canonical["\'][^>]*href=["\']https://aitoolvillage\.com/tools/)([\w\-]+)(["\'])',
                  fix_link, content
              )
              content = re.sub(
                  r'(<link[^>]*href=["\']https://aitoolvillage\.com/tools/)([\w\-]+)(["\'][^>]*rel=["\']canonical["\'])',
                  fix_link, content
              )

              # Fix YAML-style: canonical: https://...com/tools/SLUG (no .html)
              def fix_yaml(m):
                  prefix = m.group(1)
                  slug = m.group(2)
                  if not slug.endswith('.html'):
                      return f'{prefix}{slug}.html'
                  return m.group(0)

              content = re.sub(
                  r'(canonical:\s*https://aitoolvillage\.com/tools/)([\w\-]+)(?![\w\-\.])',
                  fix_yaml, content
              )

              if content != original:
                  with open(fpath, 'w', encoding='utf-8') as f:
                      f.write(content)
                  print(f'FIXED: {fname}')
                  fixed += 1
              else:
                  skipped += 1

          print(f'\nDone: {fixed} files fixed, {skipped} files unchanged')
          EOF

      - name: Fix index.html canonical
        run: |
          python3 << 'EOF'
          import os, re

          for fname in ['index.html']:
              if not os.path.exists(fname):
                  print(f'Not found: {fname}')
                  continue
              with open(fname, 'r', encoding='utf-8') as f:
                  content = f.read()
              original = content

              # canonical should be / not /index.html
              content = re.sub(
                  r'(<link[^>]*rel=["\']canonical["\'][^>]*href=["\'])https://aitoolvillage\.com/index\.html(["\'])',
                  r'\1https://aitoolvillage.com/\2', content
              )
              content = re.sub(
                  r'canonical:\s*https://aitoolvillage\.com/index\.html',
                  'canonical: https://aitoolvillage.com/', content
              )

              if content != original:
                  with open(fname, 'w', encoding='utf-8') as f:
                      f.write(content)
                  print(f'FIXED: {fname}')
              else:
                  print(f'No change needed: {fname}')
          EOF

      - name: Commit and push fixes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit — all canonicals already correct"
          else
            git commit -m "fix: add .html to canonical tags on tool pages"
            git push
            echo "Changes pushed successfully"
          fi
